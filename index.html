<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fridge</title>
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>
    </head>
    <body>
        <table id="fridge-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Expires</th>
                </tr>
            </thead>
            <tbody id="fridge-body">
                <!-- Content added dynamically -->
            </tbody>
            <tfoot id="fridge-footer">
                <tr>
                    <th>Products</th>
                    <th>Expired</th>
                </tr>
                <tr>
                    <td id="sum-products"></td>
                    <td id="sum-expired"></td>
                </tr>
            </tfoot>
        </table>
        <dialog id="add-product">
            <form id="add-product-form">
                <label for="product-input">Product</label>
                <input type="text" id="product-input" name="product" />
                <label for="expires-input">Expires</label>
                <input type="date" id="expires-input" name="expires" />
                <button type="submit" id="submit-button">Save</button>
            </form>
        </dialog>
    </body>
</html>
