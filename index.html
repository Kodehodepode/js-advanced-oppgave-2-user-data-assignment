<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fridge</title>
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>
    </head>
    <body>
        <table id="fridge">
            <thead>
                <th>
                    <td>Product</td>
                    <td>Expires</td>
                </th>
            </thead>
            <tbody id="fridge-body">
                <!-- Content added dynamically -->
            </tbody>
            <dialog id="add-product">
                <form id="add-product-form">
                    <label for="product-input">Product</label>
                    <input type="text" id="product-input" name="product">
                    <label for="expires-input">Expires</label>
                    <input type="date" id="expires-input" name="expires">
                    <button type="submit"id="submit-button">Save</button>
                </form>
            </dialog>
        </table>
    </body>
</html>
